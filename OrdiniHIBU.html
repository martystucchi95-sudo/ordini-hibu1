<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Ordini HIBU"/>
<meta name="theme-color" content="#4f46e5"/>
<title>Ordini HIBU</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#fff;font-family:"DM Sans",sans-serif;color:#1e293b}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* Layout */
#app{height:100%;display:flex;flex-direction:column;position:relative}
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}
.topbar{padding:12px 14px 10px;padding-top:calc(env(safe-area-inset-top,0px) + 12px);background:#fff;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cal-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
.bot{padding:10px 13px calc(env(safe-area-inset-bottom,0px) + 12px);background:#fff;border-top:1px solid #f1f5f9;flex-shrink:0;display:flex;gap:10px;align-items:center}

/* Buttons */
.bp{background:#4f46e5;color:#fff;border:none;padding:0 16px;height:38px;border-radius:9px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.bg{background:#fff;color:#64748b;border:1px solid #e2e8f0;padding:0 14px;height:38px;border-radius:9px;font-family:inherit;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.bw{background:#16a34a;color:#fff;border:none;padding:0 16px;height:44px;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.bi{background:none;border:none;cursor:pointer;padding:5px;color:#94a3b8;font-size:17px;display:inline-flex;align-items:center;min-width:32px;min-height:32px;justify-content:center}
button:disabled{opacity:.4;cursor:default}

/* Calendar table */
table.cal{border-collapse:collapse;table-layout:auto;min-width:100%}
table.cal th{background:#fff;border-bottom:3px solid #6366f1;border-right:1px solid #e2e8f0;padding:9px 10px 7px;text-align:center;position:sticky;top:0;z-index:5;white-space:nowrap;font-family:"Syne",sans-serif;font-weight:800;font-size:12px;color:#6366f1;letter-spacing:.4px}
table.cal th:last-child{border-right:none}
table.cal td{border-right:1px solid #e2e8f0;border-bottom:1px solid #f1f5f9;padding:0;vertical-align:top;white-space:nowrap;min-width:110px}
table.cal td:last-child{border-right:none}
.cell{padding:3px 6px 6px;display:flex;flex-direction:column;min-height:46px;cursor:pointer}
.cell:hover,.cell:active{background:#f8fafc}
.cell-empty{min-height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#cbd5e1;font-size:20px;opacity:0}
td:hover .cell-empty, td:active .cell-empty{opacity:1}
.cell-acts{display:flex;justify-content:flex-end;gap:1px;opacity:.4}
.cell-acts button{background:none;border:none;cursor:pointer;font-size:11px;color:#94a3b8;padding:1px 2px;line-height:1}

/* Articles */
.art{padding:12px 13px;background:#fff;border:1px solid #e2e8f0;border-radius:11px;margin-bottom:8px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.art:active{background:#f8fafc}
.art.sel{border-color:#86efac;background:#f0fdf4}
.art.done{opacity:.45}
.cc{width:22px;height:22px;border-radius:50%;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.cc.sel{background:#22c55e;border-color:#22c55e}
.grp-head{display:flex;align-items:center;gap:7px;padding:7px 0 5px;margin-bottom:5px;border-bottom:2px solid #e2e8f0;cursor:pointer}
.grp-head span.grp-name{flex:1;font-weight:700;font-size:14px;color:#1e293b}
.grp-head span.grp-n{font-size:12px;color:#cbd5e1;margin-right:4px}
.grp-arrow{color:#94a3b8;font-size:12px;transition:transform .15s;display:inline-block}
.grp-body.closed{display:none}

/* Sheet overlay */
.ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;align-items:flex-end}
.ov.open{display:flex}
.sht{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:14px 16px calc(env(safe-area-inset-bottom,0px)+24px);-webkit-overflow-scrolling:touch}
.hdl{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 18px}
.sht h2{font-family:"Syne",sans-serif;font-size:18px;font-weight:800;margin-bottom:18px;color:#1e293b}

/* Form */
.fi{width:100%;background:#fff;border:1px solid #e2e8f0;color:#1e293b;border-radius:10px;padding:12px 13px;font-family:inherit;font-size:15px;outline:none;-webkit-appearance:none}
.fi:focus{border-color:#6366f1}
.lb{font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-row{margin-bottom:14px}
.pal-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.pal-btn{width:30px;height:30px;border-radius:7px;border:2px solid transparent;cursor:pointer;padding:0}
.pal-btn.on{border-color:#4f46e5;transform:scale(1.18)}

/* WA screen */
.wa-preview{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;font-family:monospace;font-size:13px;color:#14532d;white-space:pre-wrap;line-height:1.9;margin-bottom:18px;min-height:80px}
</style>
</head>

<!-- SCHERMATA WHATSAPP -->

<!-- SHEET FORNITORE -->

    <input class="fi" id="fs-nome" list="forn-list" placeholder="Es. VARISCO, METRO…" oninput="onFornNomeInput()"/>

    <button class="bg" style="flex:1" onclick="closeSheet('forn')">Annulla</button>

</div>
</div>

function totalRows(){
  return Math.max(9,...DAYS.map(g=>Math.max(0,...(forn[g]||[]).map(f=>f.row+1))));
}
function getFR(g,r){return(forn[g]||[]).find(f=>f.row===r);}
function fornNomi(){const s=new Set();DAYS.forEach(g=>(forn[g]||[]).forEach(f=>s.add(f.nome)));return[...s].sort();}
function colOf(n){for(const g of DAYS){const f=(forn[g]||[]).find(f=>f.nome===n);if(f)return f.colore;}return"#374151";}
function waKey(n,g){return n+"__"+g;}
function curSel(){return waSel[waKey(selForn&&selForn.nome,selG)]||{items:[],qtx:{}};}

function renderCal(){

  document.getElementById("cal-head").innerHTML="<tr>"+DS.map(d=>`<th>${d}</th>`).join("")+"</tr>";

          </div>
          <div style="font-weight:700;font-size:11px;color:${escH(f.colore||"#1e293b")};white-space:nowrap;line-height:1.3">${escH(f.nome)}</div>
          ${f.consegna?`<div style="font-size:9px;color:#94a3b8;margin-top:1px;white-space:nowrap">${escH(f.consegna)}</div>`:""}
          ${selN>0?`<div style="font-size:9px;color:#16a34a;font-weight:700;margin-top:2px">✓ ${selN}</div>`:""}
        </div></td>`;
      }else{
        html+=`<td data-giorno="${escH(g)}" data-row="${row}" ondragover="event.preventDefault()" ondrop="dropOn(event,'${escQ(g)}',${row})" ondragenter="this.style.background='#eef2ff'" ondragleave="this.style.background=''" style="cursor:pointer" onclick="openAddForn('${escQ(g)}',${row})"><div class="cell-empty">+</div></td>`;

    html+="</tr>";

}

// ============================================================
//  DRAG & DROP (mouse + touch per iOS Safari)
// ============================================================
let _dragG=null,_dragId=null;
let _ghost=null,_touchOffX=0,_touchOffY=0;

function dragStart(ev,g,id){_dragG=g;_dragId=id;ev.dataTransfer.effectAllowed="move";}
function dragEnd(){_dragG=null;_dragId=null;document.querySelectorAll("td").forEach(t=>t.style.background="");}
function dropOn(ev,tg,tr){
  ev.currentTarget.style.background="";
  if(!_dragG||!_dragId)return;
  doMove(tg,tr);
}
function doMove(tg,tr){
  const f=(forn[_dragG]||[]).find(x=>x.id===_dragId);
  if(!f)return;
  const c={...forn};
  c[_dragG]=(c[_dragG]||[]).filter(x=>x.id!==_dragId);
  const ex=(c[tg]||[]).find(x=>x.row===tr);
  if(ex){const mx=Math.max(-1,...(c[tg]||[]).map(x=>x.row));c[tg]=(c[tg]||[]).map(x=>x.id===ex.id?{...x,row:mx+1}:x);}
  c[tg]=[...(c[tg]||[]),{...f,row:tr}];
  forn=c;saveAll();renderCal();
}

// Touch drag for iOS Safari
function touchDragStart(ev,g,id){
  // only start drag on long press (300ms)
  const touch=ev.touches[0];
  const el=ev.currentTarget;
  _touchTimer=setTimeout(()=>{
    _dragG=g;_dragId=id;
    // create ghost
    _ghost=document.createElement("div");
    _ghost.textContent=el.querySelector("[style]")&&el.querySelector("[style]").textContent||"";
    _ghost.style.cssText="position:fixed;z-index:9999;background:#fff;border:2px solid #6366f1;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#4f46e5;pointer-events:none;opacity:.85;box-shadow:0 4px 12px rgba(0,0,0,.2)";
    _touchOffX=touch.clientX;_touchOffY=touch.clientY;
    _ghost.style.left=(touch.clientX-40)+"px";_ghost.style.top=(touch.clientY-20)+"px";
    document.body.appendChild(_ghost);
    // haptic if available
    if(navigator.vibrate)navigator.vibrate(30);
    ev.preventDefault();
  },300);
}
let _touchTimer=null;
function touchDragMove(ev){
  if(!_ghost)return;
  ev.preventDefault();
  const touch=ev.touches[0];
  _ghost.style.left=(touch.clientX-40)+"px";
  _ghost.style.top=(touch.clientY-20)+"px";
  // highlight cell under finger
  _ghost.style.display="none";
  const under=document.elementFromPoint(touch.clientX,touch.clientY);
  _ghost.style.display="";
  document.querySelectorAll("td").forEach(t=>t.style.background="");
  const td=under&&under.closest("td");
  if(td&&td.dataset.row!==undefined)td.style.background="#eef2ff";
}
function touchDragEnd(ev){
  clearTimeout(_touchTimer);
  if(!_ghost){return;}
  const touch=ev.changedTouches[0];
  _ghost.remove();_ghost=null;
  _ghost=null;
  // find target cell
  const under=document.elementFromPoint(touch.clientX,touch.clientY);
  const td=under&&under.closest("td[data-row]");
  document.querySelectorAll("td").forEach(t=>t.style.background="");
  if(td&&_dragG&&_dragId){
    const tg=td.dataset.giorno;
    const tr=parseInt(td.dataset.row);
    if(tg&&!isNaN(tr))doMove(tg,tr);
  }
  _dragG=null;_dragId=null;
}
function touchCancel(){
  clearTimeout(_touchTimer);
  if(_ghost){_ghost.remove();_ghost=null;}
  _dragG=null;_dragId=null;
  document.querySelectorAll("td").forEach(t=>t.style.background="");
}

// Add global touch listeners once
document.addEventListener("touchmove",touchDragMove,{passive:false});
document.addEventListener("touchend",touchDragEnd,{passive:false});
document.addEventListener("touchcancel",touchCancel);

  setFornColor("#1d4ed8");
  // Show days checkboxes (for new)
  buildDayCheckboxes(g,[{giorno:g,consegna:""}]);
  document.getElementById("fs-giorni-wrap").style.display="block";
  document.getElementById("fs-save-btn").textContent="Aggiungi";
  openSheet("forn");
}
function openEditForn(g,id){
  _editFornG=g;_editFornId=id;
  const f=(forn[g]||[]).find(x=>x.id===id);if(!f)return;
  document.getElementById("forn-sheet-title").textContent="✏️ Modifica — "+f.nome;
  document.getElementById("fs-nome").value=f.nome;
  setFornColor(f.colore||"#1d4ed8");
  // Build days with all current days of this supplier
  const allDays=DAYS.filter(d=>(forn[d]||[]).find(x=>x.nome===f.nome));
  const days=allDays.map(d=>{const fx=(forn[d]||[]).find(x=>x.nome===f.nome);return{giorno:d,consegna:fx?fx.consegna:""};});
  buildDayCheckboxes(g,days);
  document.getElementById("fs-giorni-wrap").style.display="block";
  document.getElementById("fs-shared-hint").style.display="none";
  document.getElementById("fs-save-btn").textContent="Salva";
  openSheet("forn");
}
function buildDayCheckboxes(activeG,selected){
  const wrap=document.getElementById("fs-giorni");
  wrap.innerHTML=DAYS.map(g=>{
    const entry=selected.find(x=>x.giorno===g);
    const ch=!!entry;
    return`<div style="margin-bottom:8px">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
        <input type="checkbox" data-day="${escH(g)}" ${ch?"checked":""} style="width:22px;height:22px;accent-color:#6366f1" onchange="onDayCheck(this)"/>
        <span style="font-size:15px;font-weight:${ch?700:400};color:${ch?"#1e293b":"#94a3b8"}">${escH(g)}</span>
      </label>
      ${ch?`<input class="fi" data-consegna="${escH(g)}" value="${escH(entry.consegna)}" placeholder="Consegna (es. cons giorno dopo)" style="margin-left:32px;margin-top:6px;width:calc(100% - 32px);font-size:14px"/>`:``}
    </div>`;
  }).join("");
}
function onDayCheck(cb){
  const g=cb.dataset.day;
  const wrap=cb.closest("div");
  if(cb.checked){
    cb.closest("label").querySelector("span").style.fontWeight="700";
    cb.closest("label").querySelector("span").style.color="#1e293b";
    const inp=document.createElement("input");
    inp.className="fi";inp.dataset.consegna=g;inp.placeholder="Consegna (es. cons giorno dopo)";
    inp.style.cssText="margin-left:32px;margin-top:6px;width:calc(100% - 32px);font-size:14px;display:block;box-sizing:border-box";
    wrap.appendChild(inp);
  } else {
    cb.closest("label").querySelector("span").style.fontWeight="400";
    cb.closest("label").querySelector("span").style.color="#94a3b8";
    const inp=wrap.querySelector(`[data-consegna="${g}"]`);
    if(inp)inp.remove();
  }
}
function getDaySelections(){
  const res=[];
  document.querySelectorAll("#fs-giorni [data-day]").forEach(cb=>{
    if(cb.checked){
      const g=cb.dataset.day;
      const inp=document.querySelector(`[data-consegna="${g}"]`);
      res.push({giorno:g,consegna:inp?inp.value:""});
    }
  });
  return res;
}
function setFornColor(c){
  document.getElementById("fs-color-pick").value=c;
  document.getElementById("fs-color-hex").value=c;
  document.getElementById("fs-preview").style.color=c;
  document.getElementById("fs-preview").textContent=document.getElementById("fs-nome").value||"Anteprima";
  document.querySelectorAll(".pal-btn").forEach(b=>{b.style.border=b.dataset.c===c?"3px solid #4f46e5":"2px solid transparent";});
}
function onColorPick(){setFornColor(document.getElementById("fs-color-pick").value);}
function onColorHex(){setFornColor(document.getElementById("fs-color-hex").value);}
function onFornNomeInput(){
  const n=document.getElementById("fs-nome").value;
  document.getElementById("fs-preview").textContent=n||"Anteprima";
  const nomi=fornNomi();
  document.getElementById("fs-shared-hint").style.display=(nomi.includes(n)&&!_editFornId)?"block":"none";
  if(!_editFornId){const c=colOf(n);if(c!=="374151")setFornColor(c);}
}
function saveForn(){
  const nome=document.getElementById("fs-nome").value.trim();
  const colore=document.getElementById("fs-color-hex").value||"#1d4ed8";
  const days=getDaySelections();
  if(!nome||!days.length)return;
  const c={...forn};
  if(_editFornId){
    const oldNome=(forn[_editFornG]||[]).find(x=>x.id===_editFornId)?.nome||nome;
    const selDays=days.map(x=>x.giorno);
    const activeDays=DAYS.filter(d=>(c[d]||[]).find(x=>x.nome===oldNome));
    // remove from deselected days
    activeDays.forEach(d=>{if(!selDays.includes(d))c[d]=(c[d]||[]).filter(x=>x.nome!==oldNome);});
    // update/add in selected days
    days.forEach(({giorno,consegna})=>{
      const ex=(c[giorno]||[]).find(x=>x.nome===oldNome);
      if(ex)c[giorno]=(c[giorno]||[]).map(x=>x.nome===oldNome?{...x,nome,colore,consegna}:x);
      else{const row=Math.max(-1,...(c[giorno]||[]).map(x=>x.row))+1;c[giorno]=[...(c[giorno]||[]),{nome,colore,consegna,id:uid(),row}];}
    });
    if(nome!==oldNome){ordini[nome]=ordini[oldNome]||[];delete ordini[oldNome];gruppi[nome]=gruppi[oldNome]||[];delete gruppi[oldNome];}
  } else {
    days.forEach(({giorno,consegna})=>{
      const nf={nome,colore,consegna,id:uid(),row:_newFornRow};
      c[giorno]=[...(c[giorno]||[]).filter(f=>f.row!==_newFornRow),nf];
    });
  }
  forn=c;saveAll();closeSheet("forn");renderCal();
}
// Build palette
function initPalette(){
  document.getElementById("fs-palette").innerHTML=PAL.map(c=>`<button class="pal-btn" data-c="${c}" style="background:${c}" onclick="setFornColor('${c}')"></button>`).join("");
}

// ============================================================
//  DELETE FORNITORE
// ============================================================
let _delFornG=null,_delFornId=null;
function confirmDelForn(g,id){
  _delFornG=g;_delFornId=id;
  const f=(forn[g]||[]).find(x=>x.id===id);
  document.getElementById("del-title").textContent="Rimuovere "+((f&&f.nome)||"")+" da "+g+"?";
  document.getElementById("del-desc").textContent="Gli articoli e gli altri giorni restano invariati.";
  document.getElementById("del-confirm-btn").onclick=doDelForn;
  openSheet("del");
}
function doDelForn(){
  const c={...forn};c[_delFornG]=(c[_delFornG]||[]).filter(x=>x.id!==_delFornId);
  forn=c;saveAll();closeSheet("del");renderCal();
}

// ============================================================
//  SCHERMATA FORNITORE
// ============================================================
function openForn(g,id){
  const f=(forn[g]||[]).find(x=>x.id===id);if(!f)return;
  selG=g;selForn=f;SC("selG_v2",g);SC("selF_v2",f);
  showScreen("forn");
}
function SC(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function getGruppi(n){
  const l=gruppi[n]||[];
  if(!l.find(g=>g.id==="default"))return[{id:"default",n:"Articoli"},...l];
  return l;
}

function renderForn(){
  if(!selForn)return;
  document.getElementById("forn-title").textContent=selForn.nome;
  document.getElementById("forn-title").style.color=selForn.colore||"#1e293b";
  document.getElementById("forn-sub").textContent="📅 "+selG+(selForn.consegna?" · "+selForn.consegna:"");
  // Articles
  const arts=ordini[selForn.nome]||[];
  const grps=getGruppi(selForn.nome);
  const cs=curSel();
  let html="";
  grps.forEach(gr=>{
    const items=arts.filter(a=>a.gid===gr.id);
    html+=`<div class="grp-wrap">
      <div class="grp-head" onclick="toggleGrp(this)">
        <span class="grp-arrow">▶</span>
        <span class="grp-name">${escH(gr.n)}</span>
        <span class="grp-n">${items.length}</span>
        ${gr.id!=="default"?`<button class="bi" style="font-size:14px;color:#e2e8f0;padding:3px" onclick="event.stopPropagation();delGrp('${escQ(gr.id)}')">✕</button>`:""}
      </div>
      <div class="grp-body">`;
    items.forEach(a=>{
      const sel=cs.items.includes(a.id);
      const qa=cs.qtx[a.id];
      html+=`<div class="art${sel?" sel":""}${a.done?" done":""}" onclick="${a.done?"":"tapArt('"+escQ(a.id)+"')" }">
        <div class="cc${sel?" sel":""}">${sel?"✓":""}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;color:#1e293b;text-decoration:${a.done?"line-through":"none"}">${escH(a.nome)}</div>
          ${sel&&qa?`<div style="font-size:12px;color:#16a34a;margin-top:2px;font-weight:600">Qtà: ${escH(qa)}</div>`:""}
          ${!sel&&a.q?`<div style="font-size:12px;color:#6366f1;margin-top:1px">Default: ${escH(a.q)}</div>`:""}
          ${a.note?`<div style="font-size:12px;color:#94a3b8;margin-top:1px;font-style:italic">💬 ${escH(a.note)}</div>`:""}
        </div>
        <div style="display:flex;flex-shrink:0" onclick="event.stopPropagation()">
          <button class="bi" onclick="toggleDone('${escQ(a.id)}')">${a.done?"↩️":"✅"}</button>
          <button class="bi" onclick="openEditArt('${escQ(a.id)}')">✏️</button>
          <button class="bi" style="color:#fca5a5" onclick="confirmDelArt('${escQ(a.id)}')">🗑️</button>
        </div>
      </div>`;
    });
    html+="</div></div>";
  });
  // Add group button
  html+=`<div style="display:flex;gap:8px;margin:8px 0 120px">
    <button class="bg" style="flex:1;font-size:13px" onclick="openSheet('grp')">+ Nuovo gruppo</button>
  </div>`;
  document.getElementById("art-list").innerHTML=html;
  updateWaBar();
}

function toggleGrp(head){
  const body=head.nextElementSibling;
  const arrow=head.querySelector(".grp-arrow");
  const closed=body.classList.toggle("closed");
  arrow.style.transform=closed?"":"rotate(90deg)";
}

// ============================================================
//  ARTICOLI
// ============================================================
let _editArtId=null;
function openAddArt(){
  _editArtId=null;
  document.getElementById("art-sheet-title").textContent="➕ Nuovo Articolo";
  document.getElementById("as-nome").value="";
  document.getElementById("as-qty").value="";
  document.getElementById("as-note").value="";
  fillGrpSelect("default");
  document.getElementById("as-save-btn").textContent="Aggiungi";
  openSheet("art");
  setTimeout(()=>document.getElementById("as-nome").focus(),200);
}
function openEditArt(id){
  const arts=ordini[selForn.nome]||[];
  const a=arts.find(x=>x.id===id);if(!a)return;
  _editArtId=id;
  document.getElementById("art-sheet-title").textContent="✏️ Modifica Articolo";
  document.getElementById("as-nome").value=a.nome;
  document.getElementById("as-qty").value=a.q||"";
  document.getElementById("as-note").value=a.note||"";
  fillGrpSelect(a.gid||"default");
  document.getElementById("as-save-btn").textContent="Salva";
  openSheet("art");
}
function fillGrpSelect(selectedId){
  const grps=getGruppi(selForn&&selForn.nome);
  document.getElementById("as-grp").innerHTML=grps.map(g=>`<option value="${escH(g.id)}"${g.id===selectedId?" selected":""}>${escH(g.n)}</option>`).join("");
}
function saveArt(){
  const nome=document.getElementById("as-nome").value.trim();
  if(!nome)return;
  const q=document.getElementById("as-qty").value;
  const note=document.getElementById("as-note").value;
  const gid=document.getElementById("as-grp").value||"default";
  const n=selForn.nome;
  if(!ordini[n])ordini[n]=[];
  if(_editArtId){
    ordini[n]=ordini[n].map(a=>a.id===_editArtId?{...a,nome,q,note,gid}:a);
  } else {
    ordini[n]=[...ordini[n],{id:uid(),nome,q,note,gid,done:false}];
  }
  saveAll();closeSheet("art");renderForn();
}
function toggleDone(id){
  const n=selForn.nome;
  ordini[n]=(ordini[n]||[]).map(a=>a.id===id?{...a,done:!a.done}:a);
  saveAll();renderForn();
}

// ============================================================
//  DELETE ARTICOLO
// ============================================================
let _delArtId=null;
function confirmDelArt(id){
  _delArtId=id;
  document.getElementById("del-title").textContent="Cancellare l'articolo?";
  document.getElementById("del-desc").textContent="Verrà rimosso per tutti i giorni di questo fornitore.";
  document.getElementById("del-confirm-btn").onclick=doDelArt;
  openSheet("del");
}
function doDelArt(){
  const n=selForn.nome;
  ordini[n]=(ordini[n]||[]).filter(a=>a.id!==_delArtId);
  saveAll();closeSheet("del");renderForn();
}

// ============================================================
//  GRUPPI
// ============================================================
function saveGrp(){
  const nome=document.getElementById("gs-nome").value.trim();
  if(!nome)return;
  const n=selForn.nome;
  if(!gruppi[n])gruppi[n]=[];
  gruppi[n]=[...gruppi[n],{id:uid(),n:nome}];
  saveAll();closeSheet("grp");document.getElementById("gs-nome").value="";renderForn();
}
function delGrp(gid){
  const n=selForn.nome;
  ordini[n]=(ordini[n]||[]).map(a=>a.gid===gid?{...a,gid:"default"}:a);
  gruppi[n]=(gruppi[n]||[]).filter(g=>g.id!==gid);
  saveAll();renderForn();
}

// ============================================================
//  WA SELEZIONE
// ============================================================
let _pendingArt=null;
function tapArt(id){
  const cs=curSel();
  if(cs.items.includes(id)){
    // deselect
    const items=cs.items.filter(x=>x!==id);
    const qtx={...cs.qtx};delete qtx[id];
    waSel[waKey(selForn.nome,selG)]={items,qtx};
    saveAll();renderForn();
  } else {
    // open qty modal
    const arts=ordini[selForn.nome]||[];
    const a=arts.find(x=>x.id===id);
    _pendingArt=a;
    document.getElementById("qty-name").textContent=a?a.nome:"";
    document.getElementById("qty-input").value=a&&a.q?a.q:"";
    openSheet("qty");
    setTimeout(()=>document.getElementById("qty-input").focus(),200);
  }
}
function confirmQty(){
  const q=document.getElementById("qty-input").value;
  if(!_pendingArt)return;
  const cs=curSel();
  waSel[waKey(selForn.nome,selG)]={items:[...cs.items,_pendingArt.id],qtx:{...cs.qtx,[_pendingArt.id]:q}};
  saveAll();closeSheet("qty");renderForn();
}
function clearSel(){
  delete waSel[waKey(selForn.nome,selG)];
  saveAll();renderForn();
}
function updateWaBar(){
  const cs=curSel();
  const n=cs.items.length;
  const counter=document.getElementById("wa-counter");
  const btn=document.getElementById("wa-btn");
  const clr=document.getElementById("wa-clear-btn");
  counter.style.color=n?"#4f46e5":"#94a3b8";
  counter.textContent=n?`${n} articol${n>1?"i":"o"} selezionat${n>1?"i":"o"}`:"Tocca articolo per selezionarlo…";
  btn.disabled=!n;
  clr.style.display=n?"flex":"none";
}

// ============================================================
//  WHATSAPP
// ============================================================
function renderWA(){
  const cs=curSel();
  document.getElementById("wa-sub").textContent=(selForn&&selForn.nome||"")+" · "+cs.items.length+" articoli";
  const k=waKey(selForn&&selForn.nome,selG);
  const intro=waIntros[k]||"Buongiorno! Vi invio il nostro ordine:";
  document.getElementById("wa-intro").value=intro;
  document.getElementById("wa-intro").oninput=function(){waIntros[k]=this.value;SS("waIntros_v2",waIntros);updatePreview();};
  document.getElementById("wa-intro-sub").textContent="💾 Salvato per "+(selForn&&selForn.nome||"")+" — "+selG;
  updatePreview();
}
function updatePreview(){
  document.getElementById("wa-preview").textContent=genMsg();
}
function genMsg(){
  const cs=curSel();
  const arts=ordini[selForn&&selForn.nome]||[];
  const lista=arts.filter(a=>cs.items.includes(a.id));
  if(!lista.length)return"Nessun articolo selezionato.";
  const r=[];
  const intro=(document.getElementById("wa-intro")||{}).value||(waIntros[waKey(selForn&&selForn.nome,selG)]||"Buongiorno! Vi invio il nostro ordine:");
  if(intro.trim())r.push(intro.trim(),"");
  lista.forEach(a=>{let s="• "+a.nome;const q=cs.qtx[a.id];if(q)s+=" "+q;r.push(s);});
  r.push("","Grazie");
  return r.join("\n");
}
function copiaMsg(){
  const t=genMsg();
  const btn=document.getElementById("wa-copy-btn");
  const msg=document.getElementById("wa-copied-msg");
  function success(){btn.textContent="✅ Copiato!";btn.style.background="#15803d";msg.style.display="block";setTimeout(()=>{btn.textContent="📋 Copia messaggio";btn.style.background="";msg.style.display="none";},2500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(success).catch(()=>fallback(t,success));}
  else fallback(t,success);
}
function fallback(t,cb){
  const ta=document.createElement("textarea");ta.value=t;ta.style.cssText="position:fixed;opacity:0";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");cb();}catch(e){}
  document.body.removeChild(ta);
}

// ============================================================
//  SHEETS
// ============================================================
function openSheet(name){document.getElementById("ov-"+name).classList.add("open");}
function closeSheet(name){document.getElementById("ov-"+name).classList.remove("open");}

// ============================================================
//  UTILS
// ============================================================
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escQ(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}

// ============================================================
//  INIT
// ============================================================
initState();
initPalette();
renderCal();
// Restore screen
if(sc==="forn"&&selForn){renderForn();}
showScreen(sc||"cal");
</script>
